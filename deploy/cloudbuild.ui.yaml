# Cloud Build for the Brand UI (Next.js) → Cloud Run.
# Region europe-west6, project tools-cashtimepay-com.
# _CONCIERGE_API is baked into the client bundle at build time.

substitutions:
  _REGION: europe-west6
  _SERVICE: cashtime-concierge-ui
  _REPO: cashtime
  _IMAGE: cashtime-concierge-ui
  _CONCIERGE_API: https://concierge-api.cashtimepay.com

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg=NEXT_PUBLIC_CONCIERGE_API=${_CONCIERGE_API}
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:latest
      - ./ui

  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args: [push, "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}"]

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args: [push, "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:latest"]

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      # UI is fronted by Cloud IAP for the judging window — no public ingress.
      - --no-allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --concurrency=80
      - --timeout=60s
      - --max-instances=4
      - --port=3000

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
